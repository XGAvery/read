<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14161F">
<title>片单 MediaLog</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --ink:#14161F;
    --surface:#1E2130;
    --surface-2:#262A3D;
    --amber:#E8A33D;   /* 电影 */
    --teal:#4FB6A8;    /* 剧集 */
    --rose:#D9748A;    /* 书籍 */
    --text:#F2EFE9;
    --muted:#8B90A3;
    --line: rgba(242,239,233,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding-bottom:96px;
  }
  header.marquee{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg, var(--ink) 70%, rgba(20,22,31,0.85));
    padding:20px 16px 12px;
    border-bottom:1px solid var(--line);
  }
  header.marquee h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-size:26px;
    margin:0 0 4px;
    letter-spacing:0.3px;
  }
  header.marquee h1 span{
    color:var(--amber);
    border-bottom:2px solid var(--amber);
    padding-bottom:2px;
  }
  .tabs{
    display:flex;gap:8px;overflow-x:auto;margin-top:12px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .chip.active{
    background:var(--text);
    color:var(--ink);
    border-color:var(--text);
    font-weight:600;
  }
  .filter-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 16px;gap:8px;
  }
  .filter-bar select{
    background:var(--surface);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:8px;
    padding:6px 8px;
    font-size:13px;
  }
  main{padding:4px 16px 16px;display:flex;flex-direction:column;gap:10px;}
  .empty{
    text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;
  }
  .card{
    background:var(--surface);
    border-radius:12px;
    padding:14px;
    border-left:4px solid var(--amber);
    display:flex;flex-direction:column;gap:6px;
    cursor:pointer;
  }
  .card.tv{border-left-color:var(--teal);}
  .card.book{border-left-color:var(--rose);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card-title{font-size:16px;font-weight:600;}
  .card-meta{font-size:11px;color:var(--muted);font-family:"SFMono-Regular",Menlo,Consolas,monospace;}
  .badge{
    font-size:11px;padding:2px 8px;border-radius:999px;
    background:var(--surface-2);color:var(--muted);white-space:nowrap;
  }
  .rating-dots{letter-spacing:2px;font-size:13px;color:var(--amber);}
  .card.tv .rating-dots{color:var(--teal);}
  .card.book .rating-dots{color:var(--rose);}
  .card-note{font-size:13px;color:var(--muted);}
  .fab{
    position:fixed;right:20px;bottom:24px;
    width:56px;height:56px;border-radius:50%;
    background:var(--amber);color:var(--ink);
    font-size:28px;border:none;
    box-shadow:0 6px 18px rgba(0,0,0,0.4);
    cursor:pointer;
  }
  .sheet-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    display:none;z-index:20;
  }
  .sheet-overlay.open{display:block;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--surface);
    border-radius:16px 16px 0 0;
    padding:20px 16px 24px;
    transform:translateY(100%);
    transition:transform .25s ease;
    z-index:21;
    max-height:88vh;overflow-y:auto;
  }
  .sheet.open{transform:translateY(0);}
  .sheet h2{margin:0 0 16px;font-family:Georgia,serif;font-size:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%;padding:10px;border-radius:8px;
    border:1px solid var(--line);background:var(--surface-2);
    color:var(--text);font-size:14px;font-family:inherit;
  }
  .field textarea{min-height:60px;resize:vertical;}
  .type-select{display:flex;gap:8px;}
  .type-select button{
    flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);
    background:var(--surface-2);color:var(--muted);cursor:pointer;font-size:13px;
  }
  .type-select button.active{color:var(--ink);font-weight:600;}
  .type-select button[data-type="movie"].active{background:var(--amber);}
  .type-select button[data-type="tv"].active{background:var(--teal);}
  .type-select button[data-type="book"].active{background:var(--rose);}
  .rating-row{display:flex;align-items:center;gap:10px;}
  .rating-row input[type="range"]{flex:1;}
  .rating-value{width:34px;text-align:center;font-weight:700;}
  .sheet-actions{display:flex;gap:10px;margin-top:8px;}
  .btn{
    flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;
  }
  .btn-primary{background:var(--amber);color:var(--ink);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
  .btn-danger{background:transparent;color:var(--rose);border:1px solid var(--rose);}
</style>
</head>
<body>

<header class="marquee">
  <h1><span>片单</span> MediaLog</h1>
  <div class="tabs" id="typeTabs">
    <div class="chip active" data-type="all">全部</div>
    <div class="chip" data-type="movie">电影</div>
    <div class="chip" data-type="tv">剧集</div>
    <div class="chip" data-type="book">书籍</div>
  </div>
</header>

<div class="filter-bar">
  <select id="statusFilter">
    <option value="all">全部状态</option>
    <option value="want">想看</option>
    <option value="doing">在看</option>
    <option value="done">看完</option>
  </select>
  <select id="sortBy">
    <option value="date_desc">按日期(新→旧)</option>
    <option value="date_asc">按日期(旧→新)</option>
    <option value="rating_desc">按评分(高→低)</option>
    <option value="rating_asc">按评分(低→高)</option>
  </select>
</div>

<main id="list"></main>

<button class="fab" onclick="openForm()">+</button>

<div class="sheet-overlay" id="overlay" onclick="closeForm()"></div>
<div class="sheet" id="sheet">
  <h2 id="sheetTitle">添加记录</h2>
  <input type="hidden" id="editId">
  <div class="field">
    <label>类型</label>
    <div class="type-select" id="typeSelect">
      <button type="button" data-type="movie" class="active">电影</button>
      <button type="button" data-type="tv">剧集</button>
      <button type="button" data-type="book">书籍</button>
    </div>
  </div>
  <div class="field">
    <label>标题</label>
    <input type="text" id="fTitle" placeholder="例如:奥本海默">
  </div>
  <div class="field">
    <label>评分</label>
    <div class="rating-row">
      <input type="range" id="fRating" min="0" max="10" value="7">
      <div class="rating-value" id="ratingValue">7</div>
    </div>
  </div>
  <div class="field">
    <label>状态</label>
    <select id="fStatus">
      <option value="want">想看</option>
      <option value="doing">在看</option>
      <option value="done" selected>看完</option>
    </select>
  </div>
  <div class="field">
    <label>日期</label>
    <input type="date" id="fDate">
  </div>
  <div class="field">
    <label>备注</label>
    <textarea id="fNote" placeholder="随便写点想法……"></textarea>
  </div>
  <div class="sheet-actions">
    <button class="btn btn-ghost" onclick="closeForm()">取消</button>
    <button class="btn btn-danger" id="deleteBtn" style="display:none" onclick="deleteEntry()">删除</button>
    <button class="btn btn-primary" onclick="saveEntry()">保存</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'mediaLogEntries';
let entries = [];
let currentType = 'all';
let currentStatus = 'all';
let editingId = null;

const typeLabel = {movie:'电影', tv:'剧集', book:'书籍'};
const statusLabel = {want:'想看', doing:'在看', done:'看完'};

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){
    entries = [];
  }
}
function persist(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function ratingDots(score){
  const filled = Math.round(score);
  return '●'.repeat(filled) + '○'.repeat(10-filled);
}

function render(){
  const list = document.getElementById('list');
  let items = entries.filter(e => currentType==='all' || e.type===currentType)
                      .filter(e => currentStatus==='all' || e.status===currentStatus);

  const sortBy = document.getElementById('sortBy').value;
  items.sort((a,b)=>{
    if(sortBy==='date_desc') return (b.date||'').localeCompare(a.date||'');
    if(sortBy==='date_asc') return (a.date||'').localeCompare(b.date||'');
    if(sortBy==='rating_desc') return b.rating - a.rating;
    if(sortBy==='rating_asc') return a.rating - b.rating;
  });

  if(items.length===0){
    list.innerHTML = '<div class="empty">还没有记录,点右下角 + 添加第一条吧</div>';
    return;
  }

  list.innerHTML = items.map(e => `
    <div class="card ${e.type}" onclick="openForm('${e.id}')">
      <div class="card-top">
        <div class="card-title">${escapeHtml(e.title)}</div>
        <div class="badge">${statusLabel[e.status]}</div>
      </div>
      <div class="rating-dots">${ratingDots(e.rating)} <span style="color:var(--muted);font-size:11px">${e.rating}/10</span></div>
      ${e.note ? `<div class="card-note">${escapeHtml(e.note)}</div>` : ''}
      <div class="card-meta">${typeLabel[e.type]} · ${e.date || '无日期'}</div>
    </div>
  `).join('');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('typeTabs').addEventListener('click', e=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('#typeTabs .chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  currentType = chip.dataset.type;
  render();
});
document.getElementById('statusFilter').addEventListener('change', e=>{
  currentStatus = e.target.value;
  render();
});
document.getElementById('sortBy').addEventListener('change', render);

document.getElementById('typeSelect').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#typeSelect button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
});

document.getElementById('fRating').addEventListener('input', e=>{
  document.getElementById('ratingValue').textContent = e.target.value;
});

function openForm(id){
  editingId = id || null;
  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');
  const deleteBtn = document.getElementById('deleteBtn');

  if(id){
    const e = entries.find(x=>x.id===id);
    document.getElementById('sheetTitle').textContent = '编辑记录';
    document.getElementById('fTitle').value = e.title;
    document.getElementById('fRating').value = e.rating;
    document.getElementById('ratingValue').textContent = e.rating;
    document.getElementById('fStatus').value = e.status;
    document.getElementById('fDate').value = e.date || '';
    document.getElementById('fNote').value = e.note || '';
    document.querySelectorAll('#typeSelect button').forEach(b=>{
      b.classList.toggle('active', b.dataset.type===e.type);
    });
    deleteBtn.style.display = 'block';
  } else {
    document.getElementById('sheetTitle').textContent = '添加记录';
    document.getElementById('fTitle').value = '';
    document.getElementById('fRating').value = 7;
    document.getElementById('ratingValue').textContent = 7;
    document.getElementById('fStatus').value = 'done';
    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fNote').value = '';
    document.querySelectorAll('#typeSelect button').forEach(b=>{
      b.classList.toggle('active', b.dataset.type==='movie');
    });
    deleteBtn.style.display = 'none';
  }
  overlay.classList.add('open');
  sheet.classList.add('open');
}

function closeForm(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function saveEntry(){
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ alert('请填写标题'); return; }
  const type = document.querySelector('#typeSelect button.active').dataset.type;
  const rating = Number(document.getElementById('fRating').value);
  const status = document.getElementById('fStatus').value;
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();

  if(editingId){
    const e = entries.find(x=>x.id===editingId);
    Object.assign(e, {title, type, rating, status, date, note});
  } else {
    entries.push({id: 'e'+Date.now(), title, type, rating, status, date, note});
  }
  persist();
  closeForm();
  render();
}

function deleteEntry(){
  if(!confirm('确定删除这条记录吗?')) return;
  entries = entries.filter(x=>x.id!==editingId);
  persist();
  closeForm();
  render();
}

// 注册 service worker(离线可用),file:// 协议下会静默失败,不影响主功能
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

load();
render();
</script>
</body>
</html>
